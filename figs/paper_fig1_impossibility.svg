<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" width="520" height="440">
  <defs>
    <marker id="tri-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="520" height="440" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="260" y="28" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">Single Global Learning Rate Cannot Satisfy All Layers</text>

  <!-- Triangle (larger, with margins) -->
  <!-- Top vertex: (260, 70)  Bottom-left: (70, 370)  Bottom-right: (450, 370) -->
  <line x1="260" y1="90" x2="85" y2="355" stroke="#c0392b" stroke-width="2.5" opacity="0.5" stroke-dasharray="8,4"/>
  <line x1="85" y1="365" x2="435" y2="365" stroke="#c0392b" stroke-width="2.5" opacity="0.5" stroke-dasharray="8,4"/>
  <line x1="435" y1="355" x2="260" y2="90" stroke="#c0392b" stroke-width="2.5" opacity="0.5" stroke-dasharray="8,4"/>

  <!-- Center "impossible" label -->
  <rect x="185" y="210" rx="10" ry="10" width="150" height="44" fill="#c0392b" opacity="0.12" stroke="#c0392b" stroke-width="1.5"/>
  <text x="260" y="230" text-anchor="middle" fill="#c0392b" font-size="13" font-weight="bold">Impossible</text>
  <text x="260" y="247" text-anchor="middle" fill="#c0392b" font-size="13" font-weight="bold">Trinity</text>

  <!-- ⚡ conflict symbols on edges -->
  <text x="155" y="195" text-anchor="middle" fill="#e74c3c" font-size="18">⚡</text>
  <text x="365" y="195" text-anchor="middle" fill="#e74c3c" font-size="18">⚡</text>
  <text x="260" y="385" text-anchor="middle" fill="#e74c3c" font-size="18">⚡</text>

  <!-- Top vertex box: Large η -->
  <rect x="185" y="55" rx="8" ry="8" width="150" height="34" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="260" y="77" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Large η</text>
  <!-- Description below top box -->
  <text x="260" y="105" text-anchor="middle" fill="#922b21" font-size="9.5">Fast high-layer adaptation</text>
  <text x="260" y="118" text-anchor="middle" fill="#c0392b" font-size="9.5" font-style="italic">↳ Catastrophic forgetting in lower layers</text>

  <!-- Bottom-left vertex box: Small η -->
  <rect x="15" y="345" rx="8" ry="8" width="120" height="34" fill="#e67e22" filter="url(#shadow)"/>
  <text x="75" y="367" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Small η</text>
  <!-- Description -->
  <text x="75" y="395" text-anchor="middle" fill="#7e5109" font-size="9.5">Preserved lower-layer knowledge</text>
  <text x="75" y="408" text-anchor="middle" fill="#c0392b" font-size="9.5" font-style="italic">↳ Extremely slow convergence</text>

  <!-- Bottom-right vertex box: Moderate η -->
  <rect x="380" y="345" rx="8" ry="8" width="120" height="34" fill="#f39c12" filter="url(#shadow)"/>
  <text x="440" y="367" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Moderate η</text>
  <!-- Description -->
  <text x="440" y="395" text-anchor="middle" fill="#7d6608" font-size="9.5">Partial forgetting + partial learning</text>
  <text x="440" y="408" text-anchor="middle" fill="#c0392b" font-size="9.5" font-style="italic">↳ Neither optimal</text>

  <!-- Edge labels (outside triangle) -->
  <text x="140" y="165" text-anchor="middle" fill="#7f8c8d" font-size="9" transform="rotate(-54,140,165)">convergence vs. stability</text>
  <text x="370" y="165" text-anchor="middle" fill="#7f8c8d" font-size="9" transform="rotate(54,370,165)">learning vs. forgetting</text>
  <text x="260" y="322" text-anchor="middle" fill="#7f8c8d" font-size="9">speed vs. preservation</text>

  <!-- Arrow indicators along edges -->
  <!-- Left edge: top to bottom-left -->
  <line x1="175" y1="130" x2="110" y2="310" stroke="#c0392b" stroke-width="1.5" marker-end="url(#tri-arr)" opacity="0.4"/>
  <!-- Right edge: top to bottom-right -->
  <line x1="345" y1="130" x2="410" y2="310" stroke="#c0392b" stroke-width="1.5" marker-end="url(#tri-arr)" opacity="0.4"/>
  <!-- Bottom edge: left to right -->
  <line x1="140" y1="362" x2="380" y2="362" stroke="#c0392b" stroke-width="1.5" marker-end="url(#tri-arr)" opacity="0.4"/>

  <!-- Small annotation -->
  <rect x="170" y="415" rx="4" ry="4" width="180" height="20" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5"/>
  <text x="260" y="430" text-anchor="middle" fill="#7f8c8d" font-size="8.5">No single η satisfies all requirements</text>
</svg>
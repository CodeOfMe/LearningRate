<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 420" width="360" height="420">
  <defs>
    <linearGradient id="gradLarge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="gradSmall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gradModerate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
  </style>

  <rect width="360" height="420" fill="#ffffff" rx="6"/>

  <!-- Triangle frame -->
  <polygon points="180,90 40,340 320,340"
           fill="none" stroke="#e2e8f0" stroke-width="1.8" stroke-dasharray="8,5" stroke-linejoin="round"/>

  <!-- Large η — Top vertex -->
  <rect x="121" y="56" rx="8" ry="8" width="118" height="42" fill="url(#gradLarge)" filter="url(#softShadow)"/>
  <text x="180" y="75" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Large &#x3b7;</text>
  <text x="180" y="90" text-anchor="middle" fill="#fee2e2" font-size="8.5">Fast but forgetting</text>

  <!-- Small η — Bottom-left -->
  <rect x="4" y="330" rx="8" ry="8" width="118" height="42" fill="url(#gradSmall)" filter="url(#softShadow)"/>
  <text x="63" y="349" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Small &#x3b7;</text>
  <text x="63" y="364" text-anchor="middle" fill="#fef3c7" font-size="8.5">Stable but slow</text>

  <!-- Moderate η — Bottom-right -->
  <rect x="238" y="330" rx="8" ry="8" width="118" height="42" fill="url(#gradModerate)" filter="url(#softShadow)"/>
  <text x="297" y="349" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Moderate &#x3b7;</text>
  <text x="297" y="364" text-anchor="middle" fill="#fed7aa" font-size="8.5">Compromise</text>

  <!-- Edge labels -->
  <text x="95" y="240" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-style="italic" transform="rotate(-40,95,240)">Convergence</text>
  <text x="95" y="252" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-style="italic" transform="rotate(-40,95,252)">vs. Stability</text>

  <text x="265" y="240" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-style="italic" transform="rotate(40,265,240)">Learning</text>
  <text x="265" y="252" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-style="italic" transform="rotate(40,265,252)">vs. Forgetting</text>

  <text x="180" y="388" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-style="italic">Speed vs. Preservation</text>

  <!-- Center -->
  <circle cx="180" cy="260" r="50" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <circle cx="180" cy="260" r="45" fill="none" stroke="#f1f5f9" stroke-width="0.8"/>
  <text x="180" y="254" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="bold">Impossible</text>
  <text x="180" y="270" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="bold">Trinity</text>

  <!-- Title -->
  <text x="180" y="24" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">The Impossible Trinity of Single Learning Rate</text>
</svg>

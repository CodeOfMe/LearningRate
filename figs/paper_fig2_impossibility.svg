<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <marker id="tri-arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#c0392b"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>

  <!-- Triangle edges -->
  <line x1="200" y1="50" x2="60" y2="210" stroke="#c0392b" stroke-width="2" opacity="0.6"/>
  <line x1="60" y1="210" x2="340" y2="210" stroke="#c0392b" stroke-width="2" opacity="0.6"/>
  <line x1="340" y1="210" x2="200" y2="50" stroke="#c0392b" stroke-width="2" opacity="0.6"/>

  <!-- Center "impossible" label -->
  <rect x="140" y="120" rx="12" ry="12" width="120" height="40" fill="#c0392b" opacity="0.15" stroke="#c0392b" stroke-width="1"/>
  <text x="200" y="137" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="bold">Impossible</text>
  <text x="200" y="152" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="bold">Trinity</text>

  <!-- ⚡ symbols on edges -->
  <text x="115" y="120" text-anchor="middle" fill="#e74c3c" font-size="14">⚡</text>
  <text x="285" y="120" text-anchor="middle" fill="#e74c3c" font-size="14">⚡</text>
  <text x="200" y="235" text-anchor="middle" fill="#e74c3c" font-size="14">⚡</text>

  <!-- Top vertex: Large η -->
  <rect x="140" y="22" rx="6" ry="6" width="120" height="28" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="200" y="40" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Large η</text>
  <!-- Description below top box -->
  <text x="200" y="62" text-anchor="middle" fill="#922b21" font-size="7.5">Fast high-layer learning</text>
  <text x="200" y="73" text-anchor="middle" fill="#922b21" font-size="7.5">↓ Catastrophic forgetting</text>
  <text x="200" y="83" text-anchor="middle" fill="#922b21" font-size="7.5">in lower layers</text>

  <!-- Bottom-left vertex: Small η -->
  <rect x="10" y="196" rx="6" ry="6" width="100" height="28" fill="#e67e22" stroke="#d35400" stroke-width="1"/>
  <text x="60" y="214" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Small η</text>
  <!-- Description -->
  <text x="60" y="242" text-anchor="middle" fill="#7e5109" font-size="7.5">Preserved lower-layer</text>
  <text x="60" y="253" text-anchor="middle" fill="#7e5109" font-size="7.5">knowledge</text>
  <text x="60" y="268" text-anchor="middle" fill="#922b21" font-size="7.5">↓ Extremely slow</text>
  <text x="60" y="279" text-anchor="middle" fill="#922b21" font-size="7.5">convergence</text>

  <!-- Bottom-right vertex: Moderate η -->
  <rect x="280" y="196" rx="6" ry="6" width="120" height="28" fill="#d4a017" stroke="#b7950b" stroke-width="1"/>
  <text x="340" y="214" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Moderate η</text>
  <!-- Description -->
  <text x="340" y="242" text-anchor="middle" fill="#7d6608" font-size="7.5">Partial forgetting</text>
  <text x="340" y="253" text-anchor="middle" fill="#7d6608" font-size="7.5">+</text>
  <text x="340" y="264" text-anchor="middle" fill="#7d6608" font-size="7.5">Partial learning</text>
  <text x="340" y="279" text-anchor="middle" fill="#922b21" font-size="7.5">↓ Neither optimal</text>

  <!-- Edge labels -->
  <text x="108" y="108" text-anchor="middle" fill="#888" font-size="7" transform="rotate(-50,108,108)">convergence vs. stability</text>
  <text x="292" y="108" text-anchor="middle" fill="#888" font-size="7" transform="rotate(50,292,108)">learning vs. forgetting</text>
  <text x="200" y="225" text-anchor="middle" fill="#888" font-size="7">speed vs. preservation</text>

  <!-- Title -->
  <text x="200" y="15" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">Single Global LR for Transfer Learning</text>
</svg>
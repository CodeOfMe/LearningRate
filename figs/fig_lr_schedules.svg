<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="400" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Learning Rate Schedule Comparison</text>
  
  <!-- Axes -->
  <line x1="80" y1="340" x2="750" y2="340" stroke="#666" stroke-width="1.5"/>
  <line x1="80" y1="340" x2="80" y2="50" stroke="#666" stroke-width="1.5"/>
  <text x="415" y="370" text-anchor="middle" font-size="13" fill="#555">Training Iteration</text>
  <text x="30" y="195" text-anchor="middle" font-size="13" fill="#555" transform="rotate(-90,30,195)">Learning Rate</text>
  
  <!-- Grid lines -->
  <line x1="80" y1="280" x2="750" y2="280" stroke="#eee" stroke-width="1"/>
  <line x1="80" y1="220" x2="750" y2="220" stroke="#eee" stroke-width="1"/>
  <line x1="80" y1="160" x2="750" y2="160" stroke="#eee" stroke-width="1"/>
  <line x1="80" y1="100" x2="750" y2="100" stroke="#eee" stroke-width="1"/>
  
  <!-- Y axis labels -->
  <text x="70" y="343" text-anchor="end" font-size="11" fill="#888">0</text>
  <text x="70" y="283" text-anchor="end" font-size="11" fill="#888">0.0025</text>
  <text x="70" y="223" text-anchor="end" font-size="11" fill="#888">0.005</text>
  <text x="70" y="163" text-anchor="end" font-size="11" fill="#888">0.0075</text>
  <text x="70" y="103" text-anchor="end" font-size="11" fill="#888">0.01</text>
  
  <!-- X axis ticks -->
  <text x="80" y="358" text-anchor="middle" font-size="11" fill="#888">0</text>
  <text x="247" y="358" text-anchor="middle" font-size="11" fill="#888">2500</text>
  <text x="415" y="358" text-anchor="middle" font-size="11" fill="#888">5000</text>
  <text x="582" y="358" text-anchor="middle" font-size="11" fill="#888">7500</text>
  <text x="750" y="358" text-anchor="middle" font-size="11" fill="#888">10000</text>
  
  <!-- Step Decay (blue dashed) -->
  <polyline points="80,100 247,100 247,180 415,180 415,260 582,260 582,320 750,320" 
            fill="none" stroke="#1976D2" stroke-width="2.5" stroke-dasharray="8,4"/>
  
  <!-- Exponential Decay (orange dotted) -->
  <polyline points="80,100 97,130 114,152 147,185 180,208 247,245 314,270 381,288 448,300 515,308 582,314 649,318 750,320" 
            fill="none" stroke="#F57C00" stroke-width="2.5" stroke-dasharray="3,5"/>
  
  <!-- Cosine Annealing (green solid) -->
  <polyline points="80,100 97,100 114,101 147,104 180,109 247,125 314,150 381,178 448,210 515,243 582,275 649,302 750,320" 
            fill="none" stroke="#388E3C" stroke-width="2.5"/>
  
  <!-- STLR (red solid, thick) -->
  <polyline points="80,220 97,195 114,165 131,135 148,112 165,100 182,103 230,120 280,150 330,190 380,220 430,245 480,268 530,283 580,295 630,304 680,311 730,316 750,318" 
            fill="none" stroke="#D32F2F" stroke-width="3"/>
  
  <!-- Legend -->
  <rect x="520" y="60" width="220" height="120" fill="white" stroke="#ddd" rx="6"/>
  <line x1="535" y1="82" x2="575" y2="82" stroke="#1976D2" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="585" y="86" font-size="12" fill="#333">Step Decay</text>
  
  <line x1="535" y1="107" x2="575" y2="107" stroke="#F57C00" stroke-width="2.5" stroke-dasharray="3,5"/>
  <text x="585" y="111" font-size="12" fill="#333">Exponential Decay</text>
  
  <line x1="535" y1="132" x2="575" y2="132" stroke="#388E3C" stroke-width="2.5"/>
  <text x="585" y="136" font-size="12" fill="#333">Cosine Annealing</text>
  
  <line x1="535" y1="157" x2="575" y2="157" stroke="#D32F2F" stroke-width="3"/>
  <text x="585" y="161" font-size="12" fill="#333">STLR (ULMFiT)</text>
  
  <!-- Annotation for STLR warmup -->
  <path d="M140,90 L140,60 L220,60" fill="none" stroke="#D32F2F" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="225" y="64" font-size="11" fill="#D32F2F">warm-up phase</text>
</svg>
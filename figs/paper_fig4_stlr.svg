<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200" width="460" height="200">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>

  <!-- Plot area background -->
  <rect x="55" y="15" width="370" height="145" fill="#fafafa" stroke="#ddd" stroke-width="0.5"/>

  <!-- Y-axis -->
  <line x1="55" y1="15" x2="55" y2="160" stroke="#333" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="55" y1="160" x2="425" y2="160" stroke="#333" stroke-width="1"/>

  <!-- Y-axis label -->
  <text x="15" y="90" text-anchor="middle" fill="#333" font-size="10" transform="rotate(-90,15,90)">Learning Rate</text>

  <!-- X-axis label -->
  <text x="240" y="190" text-anchor="middle" fill="#333" font-size="10">Training Iteration</text>

  <!-- Y-axis ticks and labels -->
  <line x1="52" y1="160" x2="55" y2="160" stroke="#333" stroke-width="0.8"/>
  <text x="48" y="163" text-anchor="end" fill="#555" font-size="8">0</text>

  <line x1="52" y1="107" x2="55" y2="107" stroke="#333" stroke-width="0.8"/>
  <text x="48" y="110" text-anchor="end" fill="#555" font-size="8">0.5 η</text>

  <line x1="52" y1="55" x2="55" y2="55" stroke="#333" stroke-width="0.8"/>
  <text x="48" y="58" text-anchor="end" fill="#555" font-size="8">η</text>

  <!-- η max label -->
  <text x="48" y="48" text-anchor="end" fill="#2980b9" font-size="9" font-weight="bold">η_max</text>
  <line x1="50" y1="55" x2="55" y2="55" stroke="#2980b9" stroke-width="1.2"/>

  <!-- X-axis ticks -->
  <line x1="55" y1="160" x2="55" y2="163" stroke="#333" stroke-width="0.8"/>
  <text x="55" y="173" text-anchor="middle" fill="#555" font-size="8">0</text>

  <line x1="91" y1="160" x2="91" y2="163" stroke="#333" stroke-width="0.8"/>
  <text x="91" y="173" text-anchor="middle" fill="#555" font-size="7">T/10</text>

  <line x1="240" y1="160" x2="240" y2="163" stroke="#333" stroke-width="0.8"/>
  <text x="240" y="173" text-anchor="middle" fill="#555" font-size="8">T/2</text>

  <line x1="425" y1="160" x2="425" y2="163" stroke="#333" stroke-width="0.8"/>
  <text x="420" y="173" text-anchor="end" fill="#555" font-size="8">T</text>

  <!-- Dashed vertical cut point line at 10% of T -->
  <line x1="91" y1="18" x2="91" y2="160" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="96" y="28" text-anchor="start" fill="#e74c3c" font-size="8" font-weight="bold">cut_frac = 0.1</text>

  <!-- Phase labels -->
  <text x="73" y="175" text-anchor="middle" fill="#e67e22" font-size="7.5" font-weight="bold">Warm-up</text>
  <text x="240" y="175" text-anchor="middle" fill="#2471a3" font-size="7.5" font-weight="bold">Fine-tuning (Annealing)</text>

  <!-- The STLR curve -->
  <!-- Warm-up phase: 0 to cut_point (10% of T) — linear rise from 0 to η_max -->
  <!-- Fine-tuning phase: cut_point to T — cosine decline from η_max to 0 -->

  <!-- Using path: warm-up from (55,160) to (91,55), then cosine decline from (91,55) to (425,160) -->

  <!-- Warm-up: linear rise -->
  <path d="M 55,160 L 91,55" fill="none" stroke="#e67e22" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cosine decline: from (91,55) to (425,160) -->
  <!-- Approximate cosine annealing with bezier curves -->
  <path d="M 91,55 C 130,55 160,120 210,138 Q 280,155 350,158 Q 390,160 425,160" 
        fill="none" stroke="#2471a3" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Horizontal reference line at η_max -->
  <line x1="55" y1="55" x2="425" y2="55" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Phase bracket at top -->
  <line x1="57" y1="23" x2="89" y2="23" stroke="#e67e22" stroke-width="1.5"/>
  <text x="73" y="19" text-anchor="middle" fill="#e67e22" font-size="7.5" font-weight="bold">Phase 1</text>

  <line x1="93" y1="23" x2="365" y2="23" stroke="#2471a3" stroke-width="1.5"/>
  <text x="230" y="19" text-anchor="middle" fill="#2471a3" font-size="7.5" font-weight="bold">Phase 2</text>

  <!-- ratio annotation -->
  <text x="380" y="48" text-anchor="start" fill="#7f8c8d" font-size="8" font-style="italic">ratio = 32</text>
  <text x="380" y="59" text-anchor="start" fill="#7f8c8d" font-size="7.5">(max/min ratio)</text>
</svg>
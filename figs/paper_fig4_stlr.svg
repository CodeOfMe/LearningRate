<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>

  <rect width="360" height="280" fill="#fff" rx="4"/>

  <text x="180" y="18" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Slanted Triangular Learning Rate (STLR)</text>

  <!-- Plot area -->
  <rect x="50" y="30" width="280" height="170" fill="#fafafa" stroke="#ddd" stroke-width="0.5"/>

  <!-- Axes -->
  <line x1="50" y1="30" x2="50" y2="200" stroke="#333" stroke-width="1"/>
  <line x1="50" y1="200" x2="330" y2="200" stroke="#333" stroke-width="1"/>

  <text x="14" y="115" text-anchor="middle" fill="#333" font-size="11" transform="rotate(-90,14,115)">Learning Rate</text>
  <text x="190" y="265" text-anchor="middle" fill="#333" font-size="11">Training Iteration</text>

  <!-- Y ticks -->
  <line x1="46" y1="200" x2="50" y2="200" stroke="#333" stroke-width="0.8"/>
  <text x="42" y="204" text-anchor="end" fill="#555" font-size="10">0</text>

  <line x1="46" y1="125" x2="50" y2="125" stroke="#333" stroke-width="0.8"/>
  <text x="42" y="129" text-anchor="end" fill="#555" font-size="10">0.5η</text>

  <line x1="46" y1="60" x2="50" y2="60" stroke="#2980b9" stroke-width="1.5"/>
  <text x="42" y="64" text-anchor="end" fill="#2980b9" font-size="11" font-weight="bold">η_max</text>

  <!-- X ticks -->
  <line x1="50" y1="200" x2="50" y2="204" stroke="#333" stroke-width="0.8"/>
  <text x="50" y="218" text-anchor="middle" fill="#555" font-size="10">0</text>

  <line x1="78" y1="200" x2="78" y2="204" stroke="#333" stroke-width="0.8"/>
  <text x="78" y="218" text-anchor="middle" fill="#555" font-size="9">T/10</text>

  <line x1="190" y1="200" x2="190" y2="204" stroke="#333" stroke-width="0.8"/>
  <text x="190" y="218" text-anchor="middle" fill="#555" font-size="10">T/2</text>

  <line x1="330" y1="200" x2="330" y2="204" stroke="#333" stroke-width="0.8"/>
  <text x="326" y="218" text-anchor="end" fill="#555" font-size="10">T</text>

  <!-- Cut point -->
  <line x1="78" y1="32" x2="78" y2="200" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="84" y="42" text-anchor="start" fill="#e74c3c" font-size="10" font-weight="bold">cut = 0.1T</text>

  <!-- Phase labels -->
  <line x1="52" y1="36" x2="76" y2="36" stroke="#e67e22" stroke-width="2"/>
  <text x="64" y="32" text-anchor="middle" fill="#e67e22" font-size="9" font-weight="bold">Warm-up</text>

  <line x1="80" y1="36" x2="280" y2="36" stroke="#2471a3" stroke-width="2"/>
  <text x="180" y="32" text-anchor="middle" fill="#2471a3" font-size="9" font-weight="bold">Annealing</text>

  <!-- Reference line -->
  <line x1="50" y1="60" x2="330" y2="60" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- STLR curve -->
  <path d="M 50,200 L 78,60" fill="none" stroke="#e67e22" stroke-width="3" stroke-linecap="round"/>
  <path d="M 78,60 C 120,60 150,155 180,172 Q 240,193 300,196 Q 320,198 330,200"
        fill="none" stroke="#2471a3" stroke-width="3" stroke-linecap="round"/>

  <!-- Phase labels below -->
  <text x="64" y="242" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="bold">Phase 1</text>
  <text x="205" y="242" text-anchor="middle" fill="#2471a3" font-size="10" font-weight="bold">Phase 2</text>

  <!-- ratio annotation -->
  <text x="285" y="52" text-anchor="start" fill="#7f8c8d" font-size="10" font-style="italic">ratio = 32</text>
  <text x="285" y="65" text-anchor="start" fill="#7f8c8d" font-size="9">(max/min)</text>

  <!-- Discriminative hint -->
  <text x="180" y="275" text-anchor="middle" fill="#27ae60" font-size="9" font-style="italic">Combined with discriminative layer-wise: ηˡ = η_max^l × STLR(t)</text>
</svg>

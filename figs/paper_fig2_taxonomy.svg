<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" width="360" height="300">
  <defs>
    <marker id="arr2" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#666"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>

  <rect width="360" height="300" fill="#fff" rx="4"/>

  <text x="180" y="18" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Five-Generation Evolution of Learning Rate</text>

  <!-- Row 1: Gen 1, 2, 3 -->
  <!-- Gen 1 -->
  <rect x="14" y="32" rx="7" ry="7" width="100" height="58" fill="#c0392b"/>
  <text x="64" y="52" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Gen 1</text>
  <text x="64" y="65" text-anchor="middle" fill="#f5b7b1" font-size="8.5">Fixed LR</text>
  <text x="64" y="80" text-anchor="middle" fill="#fadbd8" font-size="8">Global · SGD</text>

  <!-- arrow -->
  <line x1="118" y1="61" x2="130" y2="61" stroke="#666" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Gen 2 -->
  <rect x="134" y="32" rx="7" ry="7" width="100" height="58" fill="#d35400"/>
  <text x="184" y="52" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Gen 2</text>
  <text x="184" y="65" text-anchor="middle" fill="#f5cba7" font-size="8.5">LR Schedule</text>
  <text x="184" y="80" text-anchor="middle" fill="#fdebd0" font-size="8">Cosine · SGDR</text>

  <!-- arrow -->
  <line x1="238" y1="61" x2="250" y2="61" stroke="#666" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Gen 3 -->
  <rect x="254" y="32" rx="7" ry="7" width="92" height="58" fill="#2471a3"/>
  <text x="300" y="52" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Gen 3</text>
  <text x="300" y="65" text-anchor="middle" fill="#aed6f1" font-size="8.5">Adaptive</text>
  <text x="300" y="80" text-anchor="middle" fill="#d6eaf8" font-size="8">Adam</text>

  <!-- Row 2: Gen 4, 5 -->
  <!-- arrow down-right from Gen3 to Gen4 -->
  <path d="M 300,92 L 300,102 Q 300,120 114,120 L 114,112" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Gen 4 -->
  <rect x="64" y="112" rx="7" ry="7" width="100" height="58" fill="#1e8449"/>
  <text x="114" y="132" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Gen 4</text>
  <text x="114" y="145" text-anchor="middle" fill="#a9dfbf" font-size="8.5">Layer-wise</text>
  <text x="114" y="160" text-anchor="middle" fill="#d5f5e3" font-size="8">LARS · Disc.</text>

  <!-- arrow -->
  <line x1="168" y1="141" x2="188" y2="141" stroke="#666" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Gen 5 -->
  <rect x="192" y="112" rx="7" ry="7" width="110" height="58" fill="#7d3c98"/>
  <text x="247" y="132" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Gen 5</text>
  <text x="247" y="145" text-anchor="middle" fill="#d2b4de" font-size="8.5">Layer × Time</text>
  <text x="247" y="160" text-anchor="middle" fill="#ebdef0" font-size="8">DALS (Ours)</text>

  <!-- Granularity bar -->
  <line x1="24" y1="192" x2="336" y2="192" stroke="#999" stroke-width="1.2" marker-end="url(#arr2)"/>
  <text x="180" y="207" text-anchor="middle" fill="#666" font-size="9">Granularity of LR assignment</text>
  <text x="28" y="207" text-anchor="start" fill="#999" font-size="8">Coarse</text>
  <text x="332" y="207" text-anchor="end" fill="#999" font-size="8">Fine</text>

  <!-- Timeline -->
  <rect x="14" y="222" rx="3" ry="3" width="332" height="6" fill="#eee" stroke="#ccc" stroke-width="0.5"/>
  <rect x="14" y="222" rx="3" ry="3" width="16" height="6" fill="#c0392b"/>
  <rect x="134" y="222" rx="3" ry="3" width="16" height="6" fill="#d35400"/>
  <rect x="254" y="222" rx="3" ry="3" width="16" height="6" fill="#2471a3"/>
  <rect x="64" y="222" rx="3" ry="3" width="16" height="6" fill="#1e8449"/>
  <rect x="192" y="222" rx="3" ry="3" width="16" height="6" fill="#7d3c98"/>

  <text x="64" y="244" text-anchor="middle" fill="#666" font-size="8">~2012</text>
  <text x="184" y="244" text-anchor="middle" fill="#666" font-size="8">~2016</text>
  <text x="300" y="244" text-anchor="middle" fill="#666" font-size="8">~2017</text>
  <text x="114" y="244" text-anchor="middle" fill="#666" font-size="8">~2019</text>
  <text x="247" y="244" text-anchor="middle" fill="#666" font-size="8">~2024+</text>

  <!-- Bottom annotation -->
  <text x="180" y="268" text-anchor="middle" fill="#e91e63" font-size="8" font-style="italic">DALS integrates all five generations → unified framework</text>

  <!-- Formal notation at bottom -->
  <text x="180" y="290" text-anchor="middle" fill="#888" font-size="8">η = const → η(t) → η(θ) → η(l) → η(l, t)</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="520" height="300">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>

  <!-- Title -->
  <text x="270" y="18" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">Best Accuracy Across 16 Optimization Strategies</text>

  <!-- Background -->
  <rect x="55" y="28" width="450" height="185" fill="#fafafa" stroke="none"/>

  <!-- Y-axis -->
  <line x1="55" y1="28" x2="55" y2="213" stroke="#333" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="55" y1="213" x2="505" y2="213" stroke="#333" stroke-width="1"/>

  <!-- Y-axis label -->
  <text x="12" y="120" text-anchor="middle" fill="#333" font-size="9" transform="rotate(-90,12,120)">Best Accuracy (%)</text>

  <!-- Y range: 73 to 87, scale = 185/(87-73) = 13.21 px per unit -->
  <!-- y = 213 - (val-73)*13.21 -->

  <!-- Y grid lines -->
  <!-- 75: y = 213 - 2*13.21 = 213-26.4 = 186.6 -->
  <line x1="55" y1="186.6" x2="505" y2="186.6" stroke="#ddd" stroke-width="0.5"/>
  <text x="50" y="189.6" text-anchor="end" fill="#666" font-size="7.5">75</text>

  <!-- 80: y = 213 - 7*13.21 = 213-92.5 = 120.5 -->
  <line x1="55" y1="120.5" x2="505" y2="120.5" stroke="#ddd" stroke-width="0.5"/>
  <text x="50" y="123.5" text-anchor="end" fill="#666" font-size="7.5">80</text>

  <!-- 85: y = 213 - 12*13.21 = 213-158.5 = 54.5 -->
  <line x1="55" y1="54.5" x2="505" y2="54.5" stroke="#ddd" stroke-width="0.5"/>
  <text x="50" y="57.5" text-anchor="end" fill="#666" font-size="7.5">85</text>

  <!-- 86: y = 213 - 13*13.21 = 213-171.7 = 41.3 -->
  <line x1="55" y1="41.3" x2="505" y2="41.3" stroke="#ccc" stroke-width="0.3" stroke-dasharray="3,3"/>

  <!-- Bars: 16 strategies sorted by accuracy -->
  <!-- bar_width=24, gap=4, start at x=63 -->
  <!-- Colors: Gen1=#c0392b, Gen2=#e67e22, Gen3=#3498db, Gen4=#27ae60, Gen5=#8e44ad, SOTA=#e91e63 -->

  <!-- 1. STLR+Discriminative: 75.3%, Gen5=#8e44ad, y=213-2.3*13.21=182.6, h=30.4 -->
  <rect x="63" y="182.6" rx="2" ry="2" width="24" height="30.4" fill="#8e44ad" opacity="0.65"/>
  <text x="75" y="179.5" text-anchor="middle" fill="#8e44ad" font-size="6.5" font-weight="bold">75.3</text>

  <!-- 2. Discriminative LR: 83.2%, Gen4=#27ae60, y=213-10.2*13.21=78.3, h=134.7 -->
  <rect x="91" y="78.3" rx="2" ry="2" width="24" height="134.7" fill="#27ae60" opacity="0.85"/>
  <text x="103" y="75" text-anchor="middle" fill="#27ae60" font-size="6.5" font-weight="bold">83.2</text>

  <!-- 3. SAM+Discriminative: 83.2%, SOTA=#e91e63 -->
  <rect x="119" y="78.3" rx="2" ry="2" width="24" height="134.7" fill="#e91e63" opacity="0.85"/>
  <text x="131" y="75" text-anchor="middle" fill="#e91e63" font-size="6.5" font-weight="bold">83.2</text>

  <!-- 4. Lion: 83.8%, Gen5=#8e44ad -->
  <rect x="147" y="70.4" rx="2" ry="2" width="24" height="142.6" fill="#8e44ad" opacity="0.85"/>
  <text x="159" y="67" text-anchor="middle" fill="#8e44ad" font-size="6.5" font-weight="bold">83.8</text>

  <!-- 5. SAM: 83.8%, Gen5=#8e44ad -->
  <rect x="175" y="70.4" rx="2" ry="2" width="24" height="142.6" fill="#8e44ad" opacity="0.85"/>
  <text x="187" y="67" text-anchor="middle" fill="#8e44ad" font-size="6.5" font-weight="bold">83.8</text>

  <!-- 6. CosineSGD: 82.3%, Gen2=#e67e22, y=213-9.3*13.21=90.2, h=122.8 -->
  <rect x="203" y="90.2" rx="2" ry="2" width="24" height="122.8" fill="#e67e22" opacity="0.85"/>
  <text x="215" y="87" text-anchor="middle" fill="#e67e22" font-size="6.5" font-weight="bold">82.3</text>

  <!-- 7. RAdam: 85.5%, Gen5=#8e44ad -->
  <rect x="231" y="52.2" rx="2" ry="2" width="24" height="160.8" fill="#8e44ad" opacity="0.85"/>
  <text x="243" y="49" text-anchor="middle" fill="#8e44ad" font-size="6.5" font-weight="bold">85.5</text>

  <!-- 8. Lookahead+AdamW: 85.6%, Gen5=#8e44ad -->
  <rect x="259" y="50.8" rx="2" ry="2" width="24" height="162.2" fill="#8e44ad" opacity="0.85"/>
  <text x="271" y="47.5" text-anchor="middle" fill="#8e44ad" font-size="6.5" font-weight="bold">85.6</text>

  <!-- 9. DALS (Ours): 85.6%, SOTA=#e91e63 -->
  <rect x="287" y="50.8" rx="2" ry="2" width="24" height="162.2" fill="#e91e63" opacity="0.95"/>
  <text x="299" y="47.5" text-anchor="middle" fill="#e91e63" font-size="6.5" font-weight="bold">85.6</text>

  <!-- 10. AdamW: 85.6%, Gen3=#3498db -->
  <rect x="315" y="50.8" rx="2" ry="2" width="24" height="162.2" fill="#3498db" opacity="0.85"/>
  <text x="327" y="47.5" text-anchor="middle" fill="#3498db" font-size="6.5" font-weight="bold">85.6</text>

  <!-- 11. Grokfast: 85.9%, Gen5=#8e44ad -->
  <rect x="343" y="46.9" rx="2" ry="2" width="24" height="166.1" fill="#8e44ad" opacity="0.85"/>
  <text x="355" y="43.5" text-anchor="middle" fill="#8e44ad" font-size="6.5" font-weight="bold">85.9</text>

  <!-- 12. Adam: 85.8%, Gen3=#3498db -->
  <rect x="371" y="48.2" rx="2" ry="2" width="24" height="164.8" fill="#3498db" opacity="0.85"/>
  <text x="383" y="45" text-anchor="middle" fill="#3498db" font-size="6.5" font-weight="bold">85.8</text>

  <!-- 13. FixedSGD: 85.9%, Gen1=#c0392b -->
  <rect x="399" y="46.9" rx="2" ry="2" width="24" height="166.1" fill="#c0392b" opacity="0.85"/>
  <text x="411" y="43.5" text-anchor="middle" fill="#c0392b" font-size="6.5" font-weight="bold">85.9</text>

  <!-- 14. SGDR: 86.1%, Gen2=#e67e22 -->
  <rect x="427" y="44.2" rx="2" ry="2" width="24" height="168.8" fill="#e67e22" opacity="0.85"/>
  <text x="439" y="41" text-anchor="middle" fill="#e67e22" font-size="6.5" font-weight="bold">86.1</text>

  <!-- 15. AdaBound: 86.1%, Gen3=#3498db -->
  <rect x="455" y="44.2" rx="2" ry="2" width="24" height="168.8" fill="#3498db" opacity="0.85"/>
  <text x="467" y="41" text-anchor="middle" fill="#3498db" font-size="6.5" font-weight="bold">86.1</text>

  <!-- 16. LARS: 86.4%, Gen4=#27ae60 -->
  <rect x="483" y="40.3" rx="2" ry="2" width="24" height="172.7" fill="#27ae60" opacity="0.85"/>
  <text x="495" y="37" text-anchor="middle" fill="#27ae60" font-size="6.5" font-weight="bold">86.4</text>

  <!-- DALS bar highlighted with border -->
  <rect x="287" y="50.8" rx="2" ry="2" width="24" height="162.2" fill="none" stroke="#e91e63" stroke-width="2"/>

  <!-- X-axis labels (rotated) -->
  <text x="75" y="222" text-anchor="end" fill="#8e44ad" font-size="5.5" transform="rotate(-50,75,222)">STLR+Disc.</text>
  <text x="103" y="222" text-anchor="end" fill="#27ae60" font-size="5.5" transform="rotate(-50,103,222)">Discriminative</text>
  <text x="131" y="222" text-anchor="end" fill="#e91e63" font-size="5.5" transform="rotate(-50,131,222)">SAM+Disc.</text>
  <text x="159" y="222" text-anchor="end" fill="#8e44ad" font-size="5.5" transform="rotate(-50,159,222)">Lion</text>
  <text x="187" y="222" text-anchor="end" fill="#8e44ad" font-size="5.5" transform="rotate(-50,187,222)">SAM</text>
  <text x="215" y="222" text-anchor="end" fill="#e67e22" font-size="5.5" transform="rotate(-50,215,222)">CosineSGD</text>
  <text x="243" y="222" text-anchor="end" fill="#8e44ad" font-size="5.5" transform="rotate(-50,243,222)">RAdam</text>
  <text x="271" y="222" text-anchor="end" fill="#8e44ad" font-size="5.5" transform="rotate(-50,271,222)">Lookahead</text>
  <text x="299" y="222" text-anchor="end" fill="#e91e63" font-size="5.5" font-weight="bold" transform="rotate(-50,299,222)">DALS (Ours)</text>
  <text x="327" y="222" text-anchor="end" fill="#3498db" font-size="5.5" transform="rotate(-50,327,222)">AdamW</text>
  <text x="355" y="222" text-anchor="end" fill="#8e44ad" font-size="5.5" transform="rotate(-50,355,222)">Grokfast</text>
  <text x="383" y="222" text-anchor="end" fill="#3498db" font-size="5.5" transform="rotate(-50,383,222)">Adam</text>
  <text x="411" y="222" text-anchor="end" fill="#c0392b" font-size="5.5" transform="rotate(-50,411,222)">FixedSGD</text>
  <text x="439" y="222" text-anchor="end" fill="#e67e22" font-size="5.5" transform="rotate(-50,439,222)">SGDR</text>
  <text x="467" y="222" text-anchor="end" fill="#3498db" font-size="5.5" transform="rotate(-50,467,222)">AdaBound</text>
  <text x="495" y="222" text-anchor="end" fill="#27ae60" font-size="5.5" transform="rotate(-50,495,222)">LARS</text>

  <!-- Legend -->
  <rect x="100" y="265" rx="2" ry="2" width="10" height="10" fill="#c0392b" opacity="0.85"/>
  <text x="114" y="274" text-anchor="start" fill="#333" font-size="7">G1: Fixed</text>

  <rect x="170" y="265" rx="2" ry="2" width="10" height="10" fill="#e67e22" opacity="0.85"/>
  <text x="184" y="274" text-anchor="start" fill="#333" font-size="7">G2: Schedule</text>

  <rect x="255" y="265" rx="2" ry="2" width="10" height="10" fill="#3498db" opacity="0.85"/>
  <text x="269" y="274" text-anchor="start" fill="#333" font-size="7">G3: Adaptive</text>

  <rect x="345" y="265" rx="2" ry="2" width="10" height="10" fill="#27ae60" opacity="0.85"/>
  <text x="359" y="274" text-anchor="start" fill="#333" font-size="7">G4: Layer-wise</text>

  <rect x="435" y="265" rx="2" ry="2" width="10" height="10" fill="#8e44ad" opacity="0.85"/>
  <text x="449" y="274" text-anchor="start" fill="#333" font-size="7">G5: L×T</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="680" height="420" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#222" font-size="12" font-weight="bold">Best Accuracy Across 18 Optimization Strategies</text>

  <!-- Plot area -->
  <rect x="65" y="40" width="580" height="200" fill="#fafafa" stroke="none"/>

  <!-- Y-axis -->
  <line x1="65" y1="40" x2="65" y2="240" stroke="#333" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="65" y1="240" x2="645" y2="240" stroke="#333" stroke-width="1"/>

  <!-- Y range: 73 to 87, scale = 200/(87-73) = 14.286 px per unit -->
  <!-- y = 240 - (val-73)*14.286 -->

  <!-- Y grid lines -->
  <!-- 75: y = 240 - 2*14.286 = 211.4 -->
  <line x1="65" y1="211" x2="645" y2="211" stroke="#ddd" stroke-width="0.5"/>
  <text x="58" y="215" text-anchor="end" fill="#666" font-size="8">75</text>

  <!-- 80: y = 240 - 7*14.286 = 140 -->
  <line x1="65" y1="140" x2="645" y2="140" stroke="#ddd" stroke-width="0.5"/>
  <text x="58" y="144" text-anchor="end" fill="#666" font-size="8">80</text>

  <!-- 85: y = 240 - 12*14.286 = 68.6 -->
  <line x1="65" y1="69" x2="645" y2="69" stroke="#ddd" stroke-width="0.5"/>
  <text x="58" y="73" text-anchor="end" fill="#666" font-size="8">85</text>

  <!-- 86: dashed reference -->
  <line x1="65" y1="54" x2="645" y2="54" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="58" y="58" text-anchor="end" fill="#999" font-size="7">86</text>

  <!-- Bars: 18 strategies, bar_width=24, gap=8, start at x=72 -->
  <!-- x_i = 72 + i*32 -->
  <!-- Colors: G1=#c0392b, G2=#e67e22, G3=#3498db, G4=#27ae60, G5=#8e44ad, SOTA=#e91e63 -->

  <!-- Sorted by accuracy ascending -->
  <!-- STLR+Disc: 75.3%, h=(75.3-73)*14.286=32.9, y=240-32.9=207 -->
  <rect x="72" y="207" rx="2" ry="2" width="24" height="33" fill="#8e44ad" opacity="0.65"/>
  <text x="84" y="203" text-anchor="middle" fill="#8e44ad" font-size="7" font-weight="bold">75.3</text>

  <!-- CosineSGD: 82.3%, h=133, y=107 -->
  <rect x="104" y="107" rx="2" ry="2" width="24" height="133" fill="#e67e22" opacity="0.85"/>
  <text x="116" y="103" text-anchor="middle" fill="#e67e22" font-size="7" font-weight="bold">82.3</text>

  <!-- Discriminative: 83.2%, h=145.7, y=94.3 -->
  <rect x="136" y="94" rx="2" ry="2" width="24" height="146" fill="#27ae60" opacity="0.85"/>
  <text x="148" y="90" text-anchor="middle" fill="#27ae60" font-size="7" font-weight="bold">83.2</text>

  <!-- SAM+Disc: 83.2%, y=94.3 -->
  <rect x="168" y="94" rx="2" ry="2" width="24" height="146" fill="#e91e63" opacity="0.75"/>
  <text x="180" y="90" text-anchor="middle" fill="#e91e63" font-size="7" font-weight="bold">83.2</text>

  <!-- Lion: 83.8%, h=154.3, y=85.7 -->
  <rect x="200" y="86" rx="2" ry="2" width="24" height="154" fill="#8e44ad" opacity="0.85"/>
  <text x="212" y="82" text-anchor="middle" fill="#8e44ad" font-size="7" font-weight="bold">83.8</text>

  <!-- SAM: 83.8%, y=85.7 -->
  <rect x="232" y="86" rx="2" ry="2" width="24" height="154" fill="#8e44ad" opacity="0.85"/>
  <text x="244" y="82" text-anchor="middle" fill="#8e44ad" font-size="7" font-weight="bold">83.8</text>

  <!-- DALS-Fast: 85.3%, h=175.7, y=64.3 -->
  <rect x="264" y="64" rx="2" ry="2" width="24" height="176" fill="#e91e63" opacity="0.7"/>
  <text x="276" y="60" text-anchor="middle" fill="#e91e63" font-size="7" font-weight="bold">85.3</text>

  <!-- RAdam: 85.5%, h=178.6, y=61.4 -->
  <rect x="296" y="61" rx="2" ry="2" width="24" height="179" fill="#8e44ad" opacity="0.85"/>
  <text x="308" y="57" text-anchor="middle" fill="#8e44ad" font-size="7" font-weight="bold">85.5</text>

  <!-- Lookahead: 85.6%, h=180, y=60 -->
  <rect x="328" y="60" rx="2" ry="2" width="24" height="180" fill="#8e44ad" opacity="0.85"/>
  <text x="340" y="56" text-anchor="middle" fill="#8e44ad" font-size="7" font-weight="bold">85.6</text>

  <!-- AdamW: 85.6%, y=60 -->
  <rect x="360" y="60" rx="2" ry="2" width="24" height="180" fill="#3498db" opacity="0.85"/>
  <text x="372" y="56" text-anchor="middle" fill="#3498db" font-size="7" font-weight="bold">85.6</text>

  <!-- DALS (Ours): 85.6%, y=60 -->
  <rect x="392" y="60" rx="2" ry="2" width="24" height="180" fill="#e91e63" opacity="0.95"/>
  <text x="404" y="56" text-anchor="middle" fill="#e91e63" font-size="7.5" font-weight="bold">85.6</text>
  <!-- DALS border highlight -->
  <rect x="392" y="60" rx="2" ry="2" width="24" height="180" fill="none" stroke="#e91e63" stroke-width="2.5"/>

  <!-- Adam: 85.8%, h=182.9, y=57.1 -->
  <rect x="424" y="57" rx="2" ry="2" width="24" height="183" fill="#3498db" opacity="0.85"/>
  <text x="436" y="53" text-anchor="middle" fill="#3498db" font-size="7" font-weight="bold">85.8</text>

  <!-- FixedSGD: 85.9%, h=184.3, y=55.7 -->
  <rect x="456" y="56" rx="2" ry="2" width="24" height="184" fill="#c0392b" opacity="0.85"/>
  <text x="468" y="52" text-anchor="middle" fill="#c0392b" font-size="7" font-weight="bold">85.9</text>

  <!-- Grokfast: 85.9%, y=55.7 -->
  <rect x="488" y="56" rx="2" ry="2" width="24" height="184" fill="#8e44ad" opacity="0.85"/>
  <text x="500" y="52" text-anchor="middle" fill="#8e44ad" font-size="7" font-weight="bold">85.9</text>

  <!-- SGDR: 86.1%, h=187.1, y=52.9 -->
  <rect x="520" y="53" rx="2" ry="2" width="24" height="187" fill="#e67e22" opacity="0.85"/>
  <text x="532" y="49" text-anchor="middle" fill="#e67e22" font-size="7" font-weight="bold">86.1</text>

  <!-- AdaBound: 86.1%, y=52.9 -->
  <rect x="552" y="53" rx="2" ry="2" width="24" height="187" fill="#3498db" opacity="0.85"/>
  <text x="564" y="49" text-anchor="middle" fill="#3498db" font-size="7" font-weight="bold">86.1</text>

  <!-- LARS: 86.4%, h=191.4, y=48.6 -->
  <rect x="584" y="49" rx="2" ry="2" width="24" height="191" fill="#27ae60" opacity="0.85"/>
  <text x="596" y="45" text-anchor="middle" fill="#27ae60" font-size="7" font-weight="bold">86.4</text>

  <!-- DALS-Acc: 86.4%, y=48.6 -->
  <rect x="616" y="49" rx="2" ry="2" width="24" height="191" fill="#e91e63" opacity="0.95"/>
  <text x="628" y="45" text-anchor="middle" fill="#e91e63" font-size="7.5" font-weight="bold">86.4</text>
  <!-- DALS-Acc border highlight -->
  <rect x="616" y="49" rx="2" ry="2" width="24" height="191" fill="none" stroke="#e91e63" stroke-width="2.5"/>

  <!-- X-axis labels (rotated -60 degrees, enough room for 18 labels) -->
  <text x="84" y="252" text-anchor="end" fill="#8e44ad" font-size="6.5" transform="rotate(-60,84,252)">STLR+Disc.</text>
  <text x="116" y="252" text-anchor="end" fill="#e67e22" font-size="6.5" transform="rotate(-60,116,252)">CosineSGD</text>
  <text x="148" y="252" text-anchor="end" fill="#27ae60" font-size="6.5" transform="rotate(-60,148,252)">Discriminative</text>
  <text x="180" y="252" text-anchor="end" fill="#e91e63" font-size="6.5" transform="rotate(-60,180,252)">SAM+Disc.</text>
  <text x="212" y="252" text-anchor="end" fill="#8e44ad" font-size="6.5" transform="rotate(-60,212,252)">Lion</text>
  <text x="244" y="252" text-anchor="end" fill="#8e44ad" font-size="6.5" transform="rotate(-60,244,252)">SAM</text>
  <text x="276" y="252" text-anchor="end" fill="#e91e63" font-size="6.5" transform="rotate(-60,276,252)">DALS-Fast</text>
  <text x="308" y="252" text-anchor="end" fill="#8e44ad" font-size="6.5" transform="rotate(-60,308,252)">RAdam</text>
  <text x="340" y="252" text-anchor="end" fill="#8e44ad" font-size="6.5" transform="rotate(-60,340,252)">Lookahead</text>
  <text x="372" y="252" text-anchor="end" fill="#3498db" font-size="6.5" transform="rotate(-60,372,252)">AdamW</text>
  <text x="404" y="252" text-anchor="end" fill="#e91e63" font-size="7" font-weight="bold" transform="rotate(-60,404,252)">DALS (Ours)</text>
  <text x="436" y="252" text-anchor="end" fill="#3498db" font-size="6.5" transform="rotate(-60,436,252)">Adam</text>
  <text x="468" y="252" text-anchor="end" fill="#c0392b" font-size="6.5" transform="rotate(-60,468,252)">FixedSGD</text>
  <text x="500" y="252" text-anchor="end" fill="#8e44ad" font-size="6.5" transform="rotate(-60,500,252)">Grokfast</text>
  <text x="532" y="252" text-anchor="end" fill="#e67e22" font-size="6.5" transform="rotate(-60,532,252)">SGDR</text>
  <text x="564" y="252" text-anchor="end" fill="#3498db" font-size="6.5" transform="rotate(-60,564,252)">AdaBound</text>
  <text x="596" y="252" text-anchor="end" fill="#27ae60" font-size="6.5" transform="rotate(-60,596,252)">LARS</text>
  <text x="628" y="252" text-anchor="end" fill="#e91e63" font-size="7" font-weight="bold" transform="rotate(-60,628,252)">DALS-Acc</text>

  <!-- Legend -->
  <rect x="100" y="395" rx="3" ry="3" width="10" height="10" fill="#c0392b" opacity="0.85"/>
  <text x="115" y="404" text-anchor="start" fill="#333" font-size="7.5">G1: Fixed</text>

  <rect x="180" y="395" rx="3" ry="3" width="10" height="10" fill="#e67e22" opacity="0.85"/>
  <text x="195" y="404" text-anchor="start" fill="#333" font-size="7.5">G2: Schedule</text>

  <rect x="280" y="395" rx="3" ry="3" width="10" height="10" fill="#3498db" opacity="0.85"/>
  <text x="295" y="404" text-anchor="start" fill="#333" font-size="7.5">G3: Adaptive</text>

  <rect x="385" y="395" rx="3" ry="3" width="10" height="10" fill="#27ae60" opacity="0.85"/>
  <text x="400" y="404" text-anchor="start" fill="#333" font-size="7.5">G4: Layer-wise</text>

  <rect x="490" y="395" rx="3" ry="3" width="10" height="10" fill="#8e44ad" opacity="0.85"/>
  <text x="505" y="404" text-anchor="start" fill="#333" font-size="7.5">G5: L×T</text>

  <rect x="555" y="395" rx="3" ry="3" width="10" height="10" fill="#e91e63" opacity="0.95"/>
  <text x="570" y="404" text-anchor="start" fill="#333" font-size="7.5">DALS Family</text>
</svg>
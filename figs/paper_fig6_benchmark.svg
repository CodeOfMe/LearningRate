<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 310" width="580" height="310">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>

  <!-- Title -->
  <text x="290" y="16" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">Best Accuracy Across 18 Optimization Strategies</text>

  <!-- Background -->
  <rect x="55" y="26" width="520" height="175" fill="#fafafa" stroke="none"/>

  <!-- Y-axis -->
  <line x1="55" y1="26" x2="55" y2="201" stroke="#333" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="55" y1="201" x2="575" y2="201" stroke="#333" stroke-width="1"/>

  <!-- Y range: 73 to 87, scale = 175/(87-73) = 12.5 px per unit -->
  <!-- y = 201 - (val-73)*12.5 -->

  <!-- Y grid lines -->
  <!-- 75: y = 201 - 2*12.5 = 176 -->
  <line x1="55" y1="176" x2="575" y2="176" stroke="#ddd" stroke-width="0.5"/>
  <text x="50" y="179" text-anchor="end" fill="#666" font-size="7.5">75</text>

  <!-- 80: y = 201 - 7*12.5 = 113.5 -->
  <line x1="55" y1="113.5" x2="575" y2="113.5" stroke="#ddd" stroke-width="0.5"/>
  <text x="50" y="117" text-anchor="end" fill="#666" font-size="7.5">80</text>

  <!-- 85: y = 201 - 12*12.5 = 51 -->
  <line x1="55" y1="51" x2="575" y2="51" stroke="#ddd" stroke-width="0.5"/>
  <text x="50" y="54" text-anchor="end" fill="#666" font-size="7.5">85</text>

  <!-- 86: dashed -->
  <line x1="55" y1="38.5" x2="575" y2="38.5" stroke="#ccc" stroke-width="0.3" stroke-dasharray="3,3"/>
  <text x="50" y="42" text-anchor="end" fill="#999" font-size="6">86</text>

  <!-- Bars: 18 strategies, bar_width=22, gap=6, start at x=60 -->
  <!-- x_i = 60 + i*28 -->

  <!-- Colors: G1=#c0392b, G2=#e67e22, G3=#3498db, G4=#27ae60, G5=#8e44ad, SOTA=#e91e63 -->

  <!-- Sorted by accuracy ascending: -->
  <!-- STLR+Disc: 75.3%, h=(75.3-73)*12.5=28.75, y=201-28.75=172.25 -->
  <rect x="60" y="172.3" rx="2" ry="2" width="22" height="28.7" fill="#8e44ad" opacity="0.65"/>
  <text x="71" y="169" text-anchor="middle" fill="#8e44ad" font-size="6" font-weight="bold">75.3</text>

  <!-- CosineSGD: 82.3%, h=116.25, y=84.75 -->
  <rect x="88" y="84.8" rx="2" ry="2" width="22" height="116.2" fill="#e67e22" opacity="0.85"/>
  <text x="99" y="81.5" text-anchor="middle" fill="#e67e22" font-size="6" font-weight="bold">82.3</text>

  <!-- Discriminative: 83.2%, h=127.5, y=73.5 -->
  <rect x="116" y="73.5" rx="2" ry="2" width="22" height="127.5" fill="#27ae60" opacity="0.85"/>
  <text x="127" y="70.5" text-anchor="middle" fill="#27ae60" font-size="6" font-weight="bold">83.2</text>

  <!-- SAM+Disc: 83.2%, y=73.5 -->
  <rect x="144" y="73.5" rx="2" ry="2" width="22" height="127.5" fill="#e91e63" opacity="0.75"/>
  <text x="155" y="70.5" text-anchor="middle" fill="#e91e63" font-size="6" font-weight="bold">83.2</text>

  <!-- Lion: 83.8%, h=135, y=66 -->
  <rect x="172" y="66" rx="2" ry="2" width="22" height="135" fill="#8e44ad" opacity="0.85"/>
  <text x="183" y="63" text-anchor="middle" fill="#8e44ad" font-size="6" font-weight="bold">83.8</text>

  <!-- SAM: 83.8%, y=66 -->
  <rect x="200" y="66" rx="2" ry="2" width="22" height="135" fill="#8e44ad" opacity="0.85"/>
  <text x="211" y="63" text-anchor="middle" fill="#8e44ad" font-size="6" font-weight="bold">83.8</text>

  <!-- RAdam: 85.5%, h=156.25, y=44.75 -->
  <rect x="228" y="44.8" rx="2" ry="2" width="22" height="156.2" fill="#8e44ad" opacity="0.85"/>
  <text x="239" y="41.5" text-anchor="middle" fill="#8e44ad" font-size="6" font-weight="bold">85.5</text>

  <!-- DALS-Fast: 85.3%, h=153.75, y=47.25 -->
  <rect x="256" y="47.3" rx="2" ry="2" width="22" height="153.7" fill="#e91e63" opacity="0.65"/>
  <text x="267" y="44" text-anchor="middle" fill="#e91e63" font-size="6" font-weight="bold">85.3</text>

  <!-- Lookahead: 85.6%, h=157.5, y=43.5 -->
  <rect x="284" y="43.5" rx="2" ry="2" width="22" height="157.5" fill="#8e44ad" opacity="0.85"/>
  <text x="295" y="40.5" text-anchor="middle" fill="#8e44ad" font-size="6" font-weight="bold">85.6</text>

  <!-- DALS (Ours): 85.6%, y=43.5 -->
  <rect x="312" y="43.5" rx="2" ry="2" width="22" height="157.5" fill="#e91e63" opacity="0.95"/>
  <text x="323" y="40.5" text-anchor="middle" fill="#e91e63" font-size="6" font-weight="bold">85.6</text>

  <!-- DALS (Ours) border highlight -->
  <rect x="312" y="43.5" rx="2" ry="2" width="22" height="157.5" fill="none" stroke="#e91e63" stroke-width="2"/>

  <!-- AdamW: 85.6%, y=43.5 -->
  <rect x="340" y="43.5" rx="2" ry="2" width="22" height="157.5" fill="#3498db" opacity="0.85"/>
  <text x="351" y="40.5" text-anchor="middle" fill="#3498db" font-size="6" font-weight="bold">85.6</text>

  <!-- Adam: 85.8%, h=160, y=41 -->
  <rect x="368" y="41" rx="2" ry="2" width="22" height="160" fill="#3498db" opacity="0.85"/>
  <text x="379" y="38" text-anchor="middle" fill="#3498db" font-size="6" font-weight="bold">85.8</text>

  <!-- FixedSGD: 85.9%, h=161.25, y=39.75 -->
  <rect x="396" y="39.8" rx="2" ry="2" width="22" height="161.2" fill="#c0392b" opacity="0.85"/>
  <text x="407" y="36.5" text-anchor="middle" fill="#c0392b" font-size="6" font-weight="bold">85.9</text>

  <!-- Grokfast: 85.9%, y=39.75 -->
  <rect x="424" y="39.8" rx="2" ry="2" width="22" height="161.2" fill="#8e44ad" opacity="0.85"/>
  <text x="435" y="36.5" text-anchor="middle" fill="#8e44ad" font-size="6" font-weight="bold">85.9</text>

  <!-- SGDR: 86.1%, h=163.75, y=37.25 -->
  <rect x="452" y="37.3" rx="2" ry="2" width="22" height="163.7" fill="#e67e22" opacity="0.85"/>
  <text x="463" y="34" text-anchor="middle" fill="#e67e22" font-size="6" font-weight="bold">86.1</text>

  <!-- AdaBound: 86.1%, y=37.25 -->
  <rect x="480" y="37.3" rx="2" ry="2" width="22" height="163.7" fill="#3498db" opacity="0.85"/>
  <text x="491" y="34" text-anchor="middle" fill="#3498db" font-size="6" font-weight="bold">86.1</text>

  <!-- LARS: 86.4%, h=167.5, y=33.5 -->
  <rect x="508" y="33.5" rx="2" ry="2" width="22" height="167.5" fill="#27ae60" opacity="0.85"/>
  <text x="519" y="30.5" text-anchor="middle" fill="#27ae60" font-size="6" font-weight="bold">86.4</text>

  <!-- DALS-Acc: 86.4%, y=33.5 -->
  <rect x="536" y="33.5" rx="2" ry="2" width="22" height="167.5" fill="#e91e63" opacity="0.95"/>
  <text x="547" y="30.5" text-anchor="middle" fill="#e91e63" font-size="6" font-weight="bold">86.4</text>

  <!-- DALS-Acc border highlight -->
  <rect x="536" y="33.5" rx="2" ry="2" width="22" height="167.5" fill="none" stroke="#e91e63" stroke-width="2"/>

  <!-- X-axis labels (rotated -55 degrees) -->
  <text x="71" y="210" text-anchor="end" fill="#8e44ad" font-size="5" transform="rotate(-55,71,210)">STLR+Disc.</text>
  <text x="99" y="210" text-anchor="end" fill="#e67e22" font-size="5" transform="rotate(-55,99,210)">CosineSGD</text>
  <text x="127" y="210" text-anchor="end" fill="#27ae60" font-size="5" transform="rotate(-55,127,210)">Discriminative</text>
  <text x="155" y="210" text-anchor="end" fill="#e91e63" font-size="5" transform="rotate(-55,155,210)">SAM+Disc.</text>
  <text x="183" y="210" text-anchor="end" fill="#8e44ad" font-size="5" transform="rotate(-55,183,210)">Lion</text>
  <text x="211" y="210" text-anchor="end" fill="#8e44ad" font-size="5" transform="rotate(-55,211,210)">SAM</text>
  <text x="239" y="210" text-anchor="end" fill="#8e44ad" font-size="5" transform="rotate(-55,239,210)">RAdam</text>
  <text x="267" y="210" text-anchor="end" fill="#e91e63" font-size="5" transform="rotate(-55,267,210)">DALS-Fast</text>
  <text x="295" y="210" text-anchor="end" fill="#8e44ad" font-size="5" transform="rotate(-55,295,210)">Lookahead</text>
  <text x="323" y="210" text-anchor="end" fill="#e91e63" font-size="6" font-weight="bold" transform="rotate(-55,323,210)">DALS (Ours)</text>
  <text x="351" y="210" text-anchor="end" fill="#3498db" font-size="5" transform="rotate(-55,351,210)">AdamW</text>
  <text x="379" y="210" text-anchor="end" fill="#3498db" font-size="5" transform="rotate(-55,379,210)">Adam</text>
  <text x="407" y="210" text-anchor="end" fill="#c0392b" font-size="5" transform="rotate(-55,407,210)">FixedSGD</text>
  <text x="435" y="210" text-anchor="end" fill="#8e44ad" font-size="5" transform="rotate(-55,435,210)">Grokfast</text>
  <text x="463" y="210" text-anchor="end" fill="#e67e22" font-size="5" transform="rotate(-55,463,210)">SGDR</text>
  <text x="491" y="210" text-anchor="end" fill="#3498db" font-size="5" transform="rotate(-55,491,210)">AdaBound</text>
  <text x="519" y="210" text-anchor="end" fill="#27ae60" font-size="5" transform="rotate(-55,519,210)">LARS</text>
  <text x="547" y="210" text-anchor="end" fill="#e91e63" font-size="5" font-weight="bold" transform="rotate(-55,547,210)">DALS-Acc</text>

  <!-- Legend -->
  <rect x="80" y="265" rx="2" ry="2" width="8" height="8" fill="#c0392b" opacity="0.85"/>
  <text x="91" y="273" text-anchor="start" fill="#333" font-size="6.5">G1: Fixed</text>

  <rect x="140" y="265" rx="2" ry="2" width="8" height="8" fill="#e67e22" opacity="0.85"/>
  <text x="151" y="273" text-anchor="start" fill="#333" font-size="6.5">G2: Schedule</text>

  <rect x="210" y="265" rx="2" ry="2" width="8" height="8" fill="#3498db" opacity="0.85"/>
  <text x="221" y="273" text-anchor="start" fill="#333" font-size="6.5">G3: Adaptive</text>

  <rect x="285" y="265" rx="2" ry="2" width="8" height="8" fill="#27ae60" opacity="0.85"/>
  <text x="296" y="273" text-anchor="start" fill="#333" font-size="6.5">G4: Layer-wise</text>

  <rect x="370" y="265" rx="2" ry="2" width="8" height="8" fill="#8e44ad" opacity="0.85"/>
  <text x="381" y="273" text-anchor="start" fill="#333" font-size="6.5">G5: L×T</text>

  <rect x="420" y="265" rx="2" ry="2" width="8" height="8" fill="#e91e63" opacity="0.95"/>
  <text x="431" y="273" text-anchor="start" fill="#333" font-size="6.5">DALS Family</text>
</svg>
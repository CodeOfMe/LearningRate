<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="500" height="280">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>

  <!-- Title -->
  <text x="250" y="15" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">Best Accuracy Comparison Across Optimization Strategies</text>

  <!-- Y-axis -->
  <line x1="50" y1="28" x2="50" y2="220" stroke="#333" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="50" y1="220" x2="490" y2="220" stroke="#333" stroke-width="1"/>

  <!-- Y-axis label -->
  <text x="12" y="125" text-anchor="middle" fill="#333" font-size="9" transform="rotate(-90,12,125)">Best Accuracy (%)</text>

  <!-- Y-axis ticks: range 35 to 87 -->
  <!-- Map: y=220 corresponds to 35, y=28 corresponds to 87 -->
  <!-- scale: (220-28)/(87-35) = 192/52 ≈ 3.692 px per unit -->
  <!-- y = 220 - (val-35)*3.692 -->

  <!-- Y grid and ticks -->
  <!-- 70 -->
  <line x1="50" y1="184.6" x2="490" y2="184.6" stroke="#eee" stroke-width="0.5"/>
  <text x="45" y="187.6" text-anchor="end" fill="#666" font-size="7.5">70</text>

  <!-- 75 -->
  <line x1="50" y1="166.2" x2="490" y2="166.2" stroke="#eee" stroke-width="0.5"/>
  <text x="45" y="169.2" text-anchor="end" fill="#666" font-size="7.5">75</text>

  <!-- 80 -->
  <line x1="50" y1="147.7" x2="490" y2="147.7" stroke="#eee" stroke-width="0.5"/>
  <text x="45" y="150.7" text-anchor="end" fill="#666" font-size="7.5">80</text>

  <!-- 85 -->
  <line x1="50" y1="129.2" x2="490" y2="129.2" stroke="#eee" stroke-width="0.5"/>
  <text x="45" y="132.2" text-anchor="end" fill="#666" font-size="7.5">85</text>

  <!-- 87 at top -->
  <text x="45" y="31" text-anchor="end" fill="#666" font-size="7.5">87</text>

  <!-- Bar chart data -->
  <!-- 16 bars, spacing: bar_width=22, gap=5, total = 16*22 + 15*5 = 352+75=427, margin_left=50, start_x=56 -->
  <!-- Recalculate: start at x=56, each bar 22px wide, gap 4.5px, total = 16*22 + 15*4.5 = 352+67.5=419.5 -->
  <!-- Actually let me use: bar_start = 55, bar_width=24, gap=4 -->

  <!-- FixedSGD: 85.9 → y = 220 - (85.9-35)*3.692 = 220 - 50.9*3.692 = 220-188.0 = 32.0... wait that's too high -->
  <!-- Let me recalculate: y for 85.9: 220-(85.9-35)*3.692 = 220-187.9 = 32.1 -->
  <!-- y for 85: 220-(85-35)*3.692 = 220-184.6 = 35.4 -->
  <!-- y for 70: 220-(70-35)*3.692 = 220-129.2 = 90.8... no -->
  <!-- Wait let me redo: y for 70: 220-(70-35)*3.692 = 220-129.2 = 90.8 -->
  <!-- Actually I had 70 at y=184.6, let me check: 220-(70-35)*3.692 = 220-129.2 = 90.8. But I said 184.6 above. Wrong! -->
  <!-- Let me recalculate: y = 220 - (val-35) * (192/52) = 220 - (val-35) * 3.692 -->
  <!-- 70: 220 - 35*3.692 = 220 - 129.2 = 90.8 -->
  <!-- 75: 220 - 40*3.692 = 220 - 147.7 = 72.3 -->
  <!-- 80: 220 - 45*3.692 = 220 - 166.2 = 53.8 -->
  <!-- 85: 220 - 50*3.692 = 220 - 184.6 = 35.4 -->
  <!-- 87: 220 - 52*3.692 = 220 - 192.0 = 28.0 -->

  <!-- Redo Y grid properly -->
  <rect x="50" y="28" width="440" height="192" fill="#fafafa" stroke="none"/>
  <!-- Re-draw axes on top -->
  <line x1="50" y1="28" x2="50" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="50" y1="220" x2="490" y2="220" stroke="#333" stroke-width="1"/>

  <!-- Y grid lines at 70, 75, 80, 85 -->
  <line x1="50" y1="90.8" x2="490" y2="90.8" stroke="#ddd" stroke-width="0.5"/>
  <line x1="50" y1="72.3" x2="490" y2="72.3" stroke="#ddd" stroke-width="0.5"/>
  <line x1="50" y1="53.8" x2="490" y2="53.8" stroke="#ddd" stroke-width="0.5"/>
  <line x1="50" y1="35.4" x2="490" y2="35.4" stroke="#ddd" stroke-width="0.5"/>

  <!-- Y tick labels -->
  <text x="45" y="93.8" text-anchor="end" fill="#666" font-size="7.5">70</text>
  <text x="45" y="75.3" text-anchor="end" fill="#666" font-size="7.5">75</text>
  <text x="45" y="56.8" text-anchor="end" fill="#666" font-size="7.5">80</text>
  <text x="45" y="38.4" text-anchor="end" fill="#666" font-size="7.5">85</text>

  <!-- Bars: x_start=56, bar_w=24, gap=3 -->
  <!-- Data: FixedSGD:85.9, CosineSGD:86.2, SGDR:85.9, Adam:85.8, AdamW:85.6, AdaBound:86.0, LARS:86.5, Discriminative:83.2, RAdam:85.1, Lion:83.8, Lookahead:84.8, SAM:85.3, Grokfast:85.2, STLR:71.1, SAM+Disc:82.6, DALS:35.9 -->

  <!-- Helper: bar_x = 56 + i*27, bar_y = 220 - (val-35)*3.692, bar_h = (val-35)*3.692 -->

  <!-- FixedSGD: 85.9, y=220-187.8=32.2, h=187.8, color=#c0392b -->
  <rect x="56" y="32.2" rx="2" ry="2" width="24" height="187.8" fill="#c0392b" opacity="0.85"/>
  <text x="68" y="28" text-anchor="middle" fill="#c0392b" font-size="7" font-weight="bold">85.9</text>

  <!-- CosineSGD: 86.2, y=220-189.1=30.9, h=189.1, color=#d35400 -->
  <rect x="83" y="30.9" rx="2" ry="2" width="24" height="189.1" fill="#d35400" opacity="0.85"/>
  <text x="95" y="27" text-anchor="middle" fill="#d35400" font-size="7" font-weight="bold">86.2</text>

  <!-- SGDR: 85.9, y=32.2, color=#d35400 -->
  <rect x="110" y="32.2" rx="2" ry="2" width="24" height="187.8" fill="#d35400" opacity="0.85"/>
  <text x="122" y="28" text-anchor="middle" fill="#d35400" font-size="7" font-weight="bold">85.9</text>

  <!-- Adam: 85.8, y=220-187.4=32.6, h=187.4, color=#2471a3 -->
  <rect x="137" y="32.6" rx="2" ry="2" width="24" height="187.4" fill="#2471a3" opacity="0.85"/>
  <text x="149" y="28" text-anchor="middle" fill="#2471a3" font-size="7" font-weight="bold">85.8</text>

  <!-- AdamW: 85.6, y=220-186.7=33.3, h=186.7, color=#2471a3 -->
  <rect x="164" y="33.3" rx="2" ry="2" width="24" height="186.7" fill="#2471a3" opacity="0.85"/>
  <text x="176" y="29" text-anchor="middle" fill="#2471a3" font-size="7" font-weight="bold">85.6</text>

  <!-- AdaBound: 86.0, y=220-188.1=31.9, h=188.1, color=#2471a3 -->
  <rect x="191" y="31.9" rx="2" ry="2" width="24" height="188.1" fill="#2471a3" opacity="0.85"/>
  <text x="203" y="27.5" text-anchor="middle" fill="#2471a3" font-size="7" font-weight="bold">86.0</text>

  <!-- LARS: 86.5, y=220-190.1=29.9, h=190.1, color=#1e8449 -->
  <rect x="218" y="29.9" rx="2" ry="2" width="24" height="190.1" fill="#1e8449" opacity="0.85"/>
  <text x="230" y="26" text-anchor="middle" fill="#1e8449" font-size="7" font-weight="bold">86.5</text>

  <!-- Discriminative: 83.2, y=220-177.7=42.3, h=177.7, color=#1e8449 -->
  <rect x="245" y="42.3" rx="2" ry="2" width="24" height="177.7" fill="#1e8449" opacity="0.85"/>
  <text x="257" y="38.5" text-anchor="middle" fill="#1e8449" font-size="7" font-weight="bold">83.2</text>

  <!-- RAdam: 85.1, y=220-184.9=35.1, h=184.9, color=#7d3c98 -->
  <rect x="272" y="35.1" rx="2" ry="2" width="24" height="184.9" fill="#7d3c98" opacity="0.85"/>
  <text x="284" y="31" text-anchor="middle" fill="#7d3c98" font-size="7" font-weight="bold">85.1</text>

  <!-- Lion: 83.8, y=220-180.1=39.9, h=180.1, color=#7d3c98 -->
  <rect x="299" y="39.9" rx="2" ry="2" width="24" height="180.1" fill="#7d3c98" opacity="0.85"/>
  <text x="311" y="36" text-anchor="middle" fill="#7d3c98" font-size="7" font-weight="bold">83.8</text>

  <!-- Lookahead: 84.8, y=220-183.8=36.2, h=183.8, color=#7d3c98 -->
  <rect x="326" y="36.2" rx="2" ry="2" width="24" height="183.8" fill="#7d3c98" opacity="0.85"/>
  <text x="338" y="32" text-anchor="middle" fill="#7d3c98" font-size="7" font-weight="bold">84.8</text>

  <!-- SAM: 85.3, y=220-185.6=34.4, h=185.6, color=#7d3c98 -->
  <rect x="353" y="34.4" rx="2" ry="2" width="24" height="185.6" fill="#7d3c98" opacity="0.85"/>
  <text x="365" y="30.5" text-anchor="middle" fill="#7d3c98" font-size="7" font-weight="bold">85.3</text>

  <!-- Grokfast: 85.2, y=220-185.3=34.7, h=185.3, color=#7d3c98 -->
  <rect x="380" y="34.7" rx="2" ry="2" width="24" height="185.3" fill="#7d3c98" opacity="0.85"/>
  <text x="392" y="30.8" text-anchor="middle" fill="#7d3c98" font-size="7" font-weight="bold">85.2</text>

  <!-- STLR: 71.1, y=220-133.1=86.9, h=133.1, color=#7d3c98 -->
  <rect x="407" y="86.9" rx="2" ry="2" width="24" height="133.1" fill="#7d3c98" opacity="0.65"/>
  <text x="419" y="83" text-anchor="middle" fill="#7d3c98" font-size="7" font-weight="bold">71.1</text>

  <!-- SAM+Disc: 82.6, y=220-175.4=44.6, h=175.4, color=#d63384 -->
  <rect x="434" y="44.6" rx="2" ry="2" width="24" height="175.4" fill="#d63384" opacity="0.85"/>
  <text x="446" y="40.5" text-anchor="middle" fill="#d63384" font-size="7" font-weight="bold">82.6</text>

  <!-- DALS: 35.9 — this is extremely low, y=220-3.3=216.7, h=3.3 -->
  <!-- This bar will be very short. Let me still draw it -->
  <rect x="461" y="216.7" rx="2" ry="2" width="24" height="3.3" fill="#e91e8c" opacity="0.85"/>
  <text x="473" y="213" text-anchor="middle" fill="#e91e8c" font-size="7" font-weight="bold">35.9</text>

  <!-- X-axis labels (rotated) -->
  <text x="68" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,68,228)">FixedSGD</text>
  <text x="95" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,95,228)">CosineSGD</text>
  <text x="122" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,122,228)">SGDR</text>
  <text x="149" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,149,228)">Adam</text>
  <text x="176" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,176,228)">AdamW</text>
  <text x="203" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,203,228)">AdaBound</text>
  <text x="230" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,230,228)">LARS</text>
  <text x="257" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,257,228)">Disc.</text>
  <text x="284" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,284,228)">RAdam</text>
  <text x="311" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,311,228)">Lion</text>
  <text x="338" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,338,228)">Lookahead</text>
  <text x="365" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,365,228)">SAM</text>
  <text x="392" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,392,228)">Grokfast</text>
  <text x="419" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,419,228)">STLR</text>
  <text x="446" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,446,228)">SAM+Disc</text>
  <text x="473" y="228" text-anchor="end" fill="#333" font-size="6.5" transform="rotate(-45,473,228)">DALS</text>

  <!-- Legend -->
  <rect x="56" y="252" rx="2" ry="2" width="10" height="10" fill="#c0392b" opacity="0.85"/>
  <text x="70" y="261" text-anchor="start" fill="#333" font-size="7">Gen1</text>

  <rect x="100" y="252" rx="2" ry="2" width="10" height="10" fill="#d35400" opacity="0.85"/>
  <text x="114" y="261" text-anchor="start" fill="#333" font-size="7">Gen2</text>

  <rect x="144" y="252" rx="2" ry="2" width="10" height="10" fill="#2471a3" opacity="0.85"/>
  <text x="158" y="261" text-anchor="start" fill="#333" font-size="7">Gen3</text>

  <rect x="188" y="252" rx="2" ry="2" width="10" height="10" fill="#1e8449" opacity="0.85"/>
  <text x="202" y="261" text-anchor="start" fill="#333" font-size="7">Gen4</text>

  <rect x="232" y="252" rx="2" ry="2" width="10" height="10" fill="#7d3c98" opacity="0.85"/>
  <text x="246" y="261" text-anchor="start" fill="#333" font-size="7">Gen5</text>

  <rect x="276" y="252" rx="2" ry="2" width="10" height="10" fill="#d63384" opacity="0.85"/>
  <text x="290" y="261" text-anchor="start" fill="#333" font-size="7">Combined</text>

  <rect x="340" y="252" rx="2" ry="2" width="10" height="10" fill="#e91e8c" opacity="0.85"/>
  <text x="354" y="261" text-anchor="start" fill="#333" font-size="7">DALS (Ours)</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="380" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Slanted Triangular Learning Rate Schedule</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#888">cut_frac=0.1, ratio=32, Î·_max=0.01</text>
  
  <!-- Axes -->
  <line x1="80" y1="310" x2="750" y2="310" stroke="#666" stroke-width="1.5"/>
  <line x1="80" y1="310" x2="80" y2="60" stroke="#666" stroke-width="1.5"/>
  
  <!-- Axis labels -->
  <text x="415" y="345" text-anchor="middle" font-size="13" fill="#555">Training Iteration (t)</text>
  <text x="30" y="185" text-anchor="middle" font-size="13" fill="#555" transform="rotate(-90,30,185)">Learning Rate (Î·)</text>
  
  <!-- Y axis labels -->
  <text x="72" y="314" text-anchor="end" font-size="10" fill="#888">0</text>
  <text x="72" y="80" text-anchor="end" font-size="10" fill="#888">Î·_max=0.01</text>
  <text x="72" y="300" text-anchor="end" font-size="10" fill="#888">Î·_minâ‰ˆ0.0003</text>
  
  <!-- Grid -->
  <line x1="80" y1="80" x2="750" y2="80" stroke="#eee" stroke-width="1"/>
  <line x1="80" y1="295" x2="750" y2="295" stroke="#eee" stroke-width="1"/>
  
  <!-- STLR curve -->
  <!-- Compute points: cut_frac=0.1, ratio=32 -->
  <!-- T=1000, cut=100 -->
  <!-- Warm-up: 0â†’100 iterations, LR goes from Î·_min to Î·_max -->
  <!-- Decay: 100â†’1000 iterations, LR goes from Î·_max to Î·_min -->
  <!-- Î·_min = 0.01 * (1+0*(32-1))/32 = 0.01/32 â‰ˆ 0.0003125 -->
  <!-- At t=0: p=0, Î· = 0.01*(1+0)/32 = 0.0003125, y = 295 -->
  <!-- At t=cut: p=1, Î· = 0.01*(1+31)/32 = 0.01, y = 80 -->
  <!-- Scale: y_scale = 230 pixels for range [0.0003, 0.01] -->
  <!-- Linear mapping: y = 310 - (Î· - 0.0003) * 230/0.0097 â‰ˆ 310 - Î·*23711 -->
  
  <!-- Simplified but accurate curve -->
  <!-- At t=0:   Î·=0.0003, y=295 -->
  <!-- At t=50:  Î·â‰ˆ0.005,   yâ‰ˆ192 -->
  <!-- At t=100: Î·=0.01,   y=80 -->
  <!-- At t=200: Î·â‰ˆ0.0085,  yâ‰ˆ108 -->
  <!-- At t=300: Î·â‰ˆ0.0072,  yâ‰ˆ140 -->
  <!-- At t=400: Î·â‰ˆ0.0060,  yâ‰ˆ168 -->
  <!-- At t=550: Î·â‰ˆ0.0045,  yâ‰ˆ204 -->
  <!-- At t=700: Î·â‰ˆ0.0030,  yâ‰ˆ240 -->
  <!-- At t=850: Î·â‰ˆ0.0018,  yâ‰ˆ268 -->
  <!-- At t=1000:Î·â‰ˆ0.0003,  yâ‰ˆ295 -->
  
  <!-- Fill area under curve -->
  <defs>
    <linearGradient id="stlrGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E53935" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E53935" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  
  <path d="M80,295 L80,295 L83,292 L86,290 L93,278 L100,260 L107,240 L114,215 L121,190 L128,165 L135,140 L142,118 L148,100 L155,87 L162,80 L170,76 L178,80 L186,85 L200,98 L220,118 L250,148 L280,172 L310,194 L340,212 L370,228 L400,242 L430,254 L460,264 L490,272 L520,278 L550,282 L580,286 L610,288 L640,290 L670,292 L700,293 L730,294 L750,295 L750,310 L80,310 Z" 
        fill="url(#stlrGrad)"/>
  
  <!-- Main curve line -->
  <path d="M80,295 L83,292 L86,290 L93,278 L100,260 L107,240 L114,215 L121,190 L128,165 L135,140 L142,118 L148,100 L155,87 L162,80 L170,76 L178,80 L186,85 L200,98 L220,118 L250,148 L280,172 L310,194 L340,212 L370,228 L400,242 L430,254 L460,264 L490,272 L520,278 L550,282 L580,286 L610,288 L640,290 L670,292 L700,293 L730,294 L750,295" 
        fill="none" stroke="#D32F2F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Cut point line -->
  <line x1="162" y1="60" x2="162" y2="310" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="165" y="73" font-size="11" fill="#1565C0" font-weight="bold">cut point</text>
  <text x="165" y="86" font-size="10" fill="#1565C0">(10% of training)</text>
  
  <!-- Peak annotation -->
  <circle cx="170" cy="76" r="4" fill="#D32F2F"/>
  <path d="M170,76 L225,60" fill="none" stroke="#D32F2F" stroke-width="1"/>
  <text x="230" y="58" font-size="11" fill="#D32F2F">Î·_max = 0.01</text>
  
  <!-- Min annotation -->
  <text x="720" y="305" text-anchor="end" font-size="11" fill="#D32F2F">Î·_min â‰ˆ 0.0003</text>
  
  <!-- Phase labels -->
  <text x="121" y="330" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold">Warm-up</text>
  <path d="M90,325 L160,325" fill="none" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arrowB)"/>
  
  <text x="450" y="330" text-anchor="middle" font-size="11" fill="#F57C00" font-weight="bold">Linear Decay</text>
  <path d="M300,325 L600,325" fill="none" stroke="#F57C00" stroke-width="1.5" marker-end="url(#arrowO)"/>
  
  <defs>
    <marker id="arrowB" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#1565C0"/></marker>
    <marker id="arrowO" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#F57C00"/></marker>
  </defs>
  
  <!-- Ratio annotation -->
  <rect x="560" y="80" width="180" height="60" fill="white" stroke="#ddd" rx="6"/>
  <text x="650" y="100" text-anchor="middle" font-size="11" fill="#333">ratio = Î·_max / Î·_min</text>
  <text x="650" y="117" text-anchor="middle" font-size="11" fill="#333">= 0.01 / 0.0003 â‰ˆ 32</text>
  <text x="650" y="132" text-anchor="middle" font-size="10" fill="#888">controls LR range</text>
</svg>